<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Job Tracker || WebApp</title>
</head>
<body class="bg-[#F8FAFC]">

    <!-- header -->


    <header class="header container mx-auto my-10">
        <h1 class="text-[32px] font-bold mb-5">
            Job Application Tracker
        </h1>
        <div class="header-cardBox grid grid-cols-3 gap-4">
            <div class="header-card flex flex-col gap-2  bg-white p-5">
                <p class="font-medium text-[#323B49] text-[14px]">
                    Total
                </p>
                <h5 class="font-bold text-2xl">
                    8
                </h5>
            </div>
            <div class="header-card flex flex-col gap-2  bg-white p-5">
                <p class="font-medium text-[#323B49] text-[14px]">
                    Interview
                </p>
                <h5 class="font-bold text-2xl">
                    <span class="text-[#10B981]">0</span>
                </h5>
            </div>
            <div class="header-card flex flex-col gap-2  bg-white p-5">
                <p class="font-medium text-[#323B49] text-[14px]">
                    Reject
                </p>
                <h5 class="font-bold text-2xl">
                    <span class="text-[#EF4444]">0</span>
                </h5>
            </div>
        </div>
    </header>

    <div class="line container mx-auto border-b border-[#E6E7E9] my-[30px]"></div>

    <!-- main section -->

    <main class="container mx-auto">
        <div class="main-heading flex justify-between">
            <h3 class="text-[20px] font-semibold text-[#002C5C]">
                Available Jobs
            </h3>
            <p class="text-[16px] font-medium text-[#64748B]">
                8 Jobs
            </p>
        </div>
    </main>
</body>
</html>
