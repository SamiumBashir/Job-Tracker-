<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Job Tracker || WebApp</title>
</head>
<body class="bg-[#F8FAFC] h-screen">

    <!-- header -->


    <header class="header container mx-auto my-10">
        <h1 class="text-[32px] font-bold mb-5">
            Job Application Tracker
        </h1>
        <div class="header-cardBox grid grid-cols-3 gap-4">
            <div class="header-card flex flex-col gap-2  bg-white p-5">
                <p class="font-medium text-[#323B49] text-[14px]">
                    Total
                </p>
                <h5 class="font-bold text-2xl">
                    8
                </h5>
            </div>
            <div class="header-card flex flex-col gap-2  bg-white p-5">
                <p class="font-medium text-[#323B49] text-[14px]">
                    Interview
                </p>
                <h5 class="font-bold text-2xl">
                    <span class="text-[#10B981]">0</span>
                </h5>
            </div>
            <div class="header-card flex flex-col gap-2  bg-white p-5">
                <p class="font-medium text-[#323B49] text-[14px]">
                    Reject
                </p>
                <h5 class="font-bold text-2xl">
                    <span class="text-[#EF4444]">0</span>
                </h5>
            </div>
        </div>
    </header>

    <div class="line container mx-auto border-b border-[#E6E7E9] my-[30px]"></div>

    <!-- main section -->

    <main class="container mx-auto">
        <div class="main-heading flex justify-between mb-6">
            <h3 class="text-[20px] font-semibold text-[#002C5C]">
                Available Jobs
            </h3>
            <p class="text-[16px] font-medium text-[#64748B]">
                0 Jobs
            </p>
        </div>
        <div class="main-jobs-cards space-y-4 mb-10">
            <div class="main-menu-btn mb-4">
                <button class="btn btn-sm hover:bg-primary hover:text-white">ALL</button>
                <button class="btn btn-sm hover:bg-primary hover:text-white">Interview</button>
                <button class="btn btn-sm hover:bg-primary hover:text-white">Rejected</button>
            </div>
        </div>
        <div class="flex flex-col gap-5 items-center px-[60px] py-10 bg-white">
            <img src="./images/jobs.png" alt="a image about nothing select">
            <h1 class="font-semibold text-2xl text-[#002C5C] leading-8">
                No Jobs Available
            </h1>
            <p class="text-[#64748B] leading-[22px]">
                Check back soon for new job opportunities
            </p>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</body>
</html>
